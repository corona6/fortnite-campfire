<!DOCTYPE html>
<title>fortnite campfire</title>
<style>
    body {
        background-color: #000;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        height: 100%;
        min-height: 100%;
        width: 100%;
        min-width: 100%;
    }

    #play-icon {
        position: absolute;
    }
</style>
<video id="video-player" muted loop>
    <source src="./fc.mp4" type="video/mp4" />
</video>
<audio id="audio-player" loop src="./fc.m4a"></audio>
<div id="play-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="5rem" height="5rem" fill="#fff" class="bi bi-play-fill"
        viewBox="0 0 16 16">
        <path
            d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z" />
    </svg>
</div>
<script>
    let isPlay = false;
    const audioPlayer = document.getElementById('audio-player');
    const videoPlayer = document.getElementById('video-player');
    const playIcon = document.getElementById('play-icon');
    document.body.onclick = function () {
        isPlay = !isPlay;
        if (isPlay) {
            audioPlayer.play();
            videoPlayer.play();
            playIcon.style.display = 'none';
        } else {
            audioPlayer.pause();
            videoPlayer.pause();
            playIcon.style.display = 'block';
        }
    }
</script>
<script type="module">
    import { DiscordSDK } from "https://esm.sh/@discord/embedded-app-sdk";

    // Discord SDKの初期化 (自身のClient IDに置き換えてください)
    const discordSdk = new DiscordSDK("1289296435514183791");

    async function setupDiscordSdk() {
        // SDKの準備が完了するのを待機
        await discordSdk.ready();

        // 1. Authorize (Discordクライアントに認証コードを要求)
        const { code } = await discordSdk.commands.authorize({
            client_id: "1289296435514183791",
            response_type: "code",
            state: "",
            prompt: "none",
            scope: ["identify", "rpc.activities.write"],
        });

        // 2. バックエンドサーバー経由でTokenを取得
        // FIXME: Cloudflare Workersにデプロイした後、取得したURLに書き換えてください
        const WORKER_URL = 'https://discord-activity-token-api.ssync.workers.dev/api/token';

        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code }),
        });
        const tokenData = await response.json();

        if (tokenData.error || !tokenData.access_token) {
            showDebug("Token Error: " + JSON.stringify(tokenData));
            throw new Error("Failed to get access token");
        }

        showDebug("Token OK, authenticating...");

        // 3. Authenticate (取得したTokenで認証を完了)
        await discordSdk.commands.authenticate({ access_token: tokenData.access_token });

        showDebug("Auth OK, setting activity...");

        // 4. Rich Presence (Activity) の設定
        await discordSdk.commands.setActivity({
            activity: {
                type: 0, // 0: Playing, 1: Streaming, 2: Listening, 3: Watching, 4: Custom, 5: Competing
                details: "Warming up by the campfire",
                state: "Listening to lofi",
            }
        });

        showDebug("Activity Set!");
    }

    setupDiscordSdk().catch((err) => {
        console.error(err);
        showDebug("SDK Error: " + err.message);
    });
</script>
<div id="debug-log" style="position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; z-index: 9999; background: rgba(0,0,0,0.5); padding: 5px;"></div>
<script>
    function showDebug(msg) {
        const div = document.getElementById('debug-log');
        div.innerHTML += msg + "<br>";
        console.log(msg);
    }
</script>
